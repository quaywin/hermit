services:
  hermit:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: hermit_orchestrator_dev
    ports:
      - "3000:3000" # Web dashboard
      - "41642:41641/udp" # Tailscale UDP port
    privileged: true
    volumes:
      # Mount the whole project directory so code updates are hot-reloaded
      - .:/app
      - /app/_build
    environment:
      - MIX_ENV=dev
      - PHX_SERVER=true
      - PORT=3000
      - PHX_HOST=${PHX_HOST:-localhost}
      - STORAGE_BASE_PATH=/app/storage
      - HERMIT_BASIC_AUTH_USER
      - HERMIT_BASIC_AUTH_PASS
    restart: unless-stopped
