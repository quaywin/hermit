services:
  hermit:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: hermit_orchestrator_dev
    ports:
      - "3000:3000"                     # Web dashboard
    privileged: true
    volumes:
      # Mount the whole project directory so code updates are hot-reloaded
      - .:/app
      - /app/_build
    environment:
      - MIX_ENV=dev
      - PHX_SERVER=true
      - PORT=3000
      - PHX_HOST=localhost
      - STORAGE_BASE_PATH=/app/storage
    restart: unless-stopped
