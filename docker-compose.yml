services:
  hermit:
    image: ghcr.io/quaywin/hermit:latest
    container_name: hermit_orchestrator
    # network_mode: host # Sửa thành ports mapping để chạy chế độ cô lập (Bridge Mode)
    ports:
      - "${HERMIT_PORT:-3000}:3000" # Web dashboard
      - "41642:41641/udp" # Tailscale UDP port
    privileged: true
    volumes:
      # Mount storage directory for Sandboxed configurations
      - ./storage:/app/storage
    environment:
      - PHX_SERVER=true
      - PORT=3000
      - PHX_HOST=${PHX_HOST:-localhost}
      - SECRET_KEY_BASE=56eb70dfc4a56a64cfc4a56a64cfc4a56a64cfc4a56a64cfc4a56a64cfc4a56a
      - STORAGE_BASE_PATH=/app/storage
      - HERMIT_BASIC_AUTH_USER
      - HERMIT_BASIC_AUTH_PASS
    restart: unless-stopped
